<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Commands Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <style>body{padding:1rem}</style>
</head>
<body>
  <div class="container">
    <h3>Commands - Admin</h3>
    <div class="mb-3">
      <label class="form-label">API Key (for cancel/resend)</label>
      <input id="api-key" class="form-control" placeholder="Paste API key (stored in session)" />
    </div>
    <div class="row mb-3">
      <div class="col-md-4"><input id="filter-device" class="form-control" placeholder="Filter deviceId" /></div>
      <div class="col-md-3"><select id="filter-status" class="form-select"><option value="">All statuses</option><option>pending</option><option>delivered</option><option>done</option><option>cancelled</option></select></div>
      <div class="col-md-2"><button id="apply-filters" class="btn btn-primary">Apply</button></div>
      <div class="col-md-3 text-end"><button id="refresh-btn" class="btn btn-outline-secondary">Refresh</button></div>
    </div>

    <ul id="cmd-list" class="list-group"></ul>
  </div>

  <script src="commands.js"></script>
</body>
</html>
